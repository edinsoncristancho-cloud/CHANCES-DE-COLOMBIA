<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1a0a">
<title>Chances Colombia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gr:#00e04b;--gr2:#00ff55;--gr3:#00b33c;--gr4:#007a28;
  --glow:rgba(0,224,75,0.5);--glow2:rgba(0,255,85,0.2);
  --bg0:#040d04;--bg1:#071207;--bg2:#0c1a0c;--bg3:#112211;--bg4:#162816;
  --bdr:rgba(0,180,60,0.2);--bdrb:rgba(0,224,75,0.6);
  --tx:#d4f0d4;--txm:#5a8a5a;--txd:#2a4a2a;
  --gold:#f0c040;--goldd:#b08820;
  --r:10px;--rs:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Barlow Condensed',sans-serif;background:var(--bg0);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* fondo con patron */
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,180,60,0.08) 0%,transparent 60%),
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,180,60,0.02) 40px,rgba(0,180,60,0.02) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,180,60,0.02) 40px,rgba(0,180,60,0.02) 41px);
  pointer-events:none}

/* HEADER */
.hdr{position:relative;z-index:10;text-align:center;padding:0;border-bottom:1px solid var(--bdrb);overflow:hidden}
.hdr-top{background:linear-gradient(180deg,#0c2a0c 0%,#071207 100%);padding:20px 16px 16px;position:relative}
.hdr-top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gr),var(--gr2),var(--gr),transparent)}
.logo-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}
.logo-circle{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle,var(--gr2) 0%,var(--gr) 40%,var(--gr3) 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--glow),0 0 40px rgba(0,180,60,0.3);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
.logo-inner{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#040d04;letter-spacing:1px}
@keyframes pulse{0%,100%{box-shadow:0 0 20px var(--glow),0 0 40px rgba(0,180,60,0.3)}50%{box-shadow:0 0 30px var(--glow),0 0 60px rgba(0,180,60,0.5)}}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,6vw,48px);letter-spacing:5px;color:var(--gr2);text-shadow:0 0 20px var(--glow),0 0 40px rgba(0,180,60,0.4);line-height:1}
.hsub{font-size:12px;color:var(--txm);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.hdate{display:inline-block;margin-top:10px;font-size:12px;color:var(--gr);background:rgba(0,180,60,0.1);border:1px solid rgba(0,180,60,0.3);border-radius:20px;padding:3px 14px;letter-spacing:1px;font-family:'DM Mono',monospace}
.slogan{background:#071207;border-top:1px solid rgba(0,180,60,0.15);padding:8px 16px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:var(--txm);display:flex;align-items:center;justify-content:center;gap:8px}
.slogan span{color:var(--gr);text-shadow:0 0 10px var(--glow)}

/* TABS */
.tabs{display:flex;justify-content:center;gap:2px;padding:10px 12px;background:rgba(0,0,0,0.5);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);flex-wrap:wrap}
.tab{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;padding:7px 18px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--txm);cursor:pointer;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--gr);background:rgba(0,180,60,0.08)}
.tab.on{background:rgba(0,180,60,0.15);border-color:var(--bdrb);color:var(--gr2);text-shadow:0 0 8px var(--glow)}

/* MAIN */
.main{position:relative;z-index:1;padding:16px 12px;max-width:920px;margin:0 auto}
.sec{display:none}.sec.on{display:block}

/* FILTROS */
.frow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.flbl{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--txm)}
.fbtn{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;padding:5px 14px;border-radius:6px;border:1px solid var(--bdr);background:transparent;color:var(--txm);cursor:pointer;transition:all .15s}
.fbtn:hover{background:rgba(0,180,60,0.08);color:var(--gr)}
.fbtn.on{border-color:var(--bdrb);color:var(--gr2);background:rgba(0,180,60,0.12);text-shadow:0 0 6px var(--glow)}

/* GRID RESULTADOS */
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:10px}
.rcard{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.rcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.rcard.tm::before{background:var(--gold)}
.rcard.td::before{background:var(--gr)}
.rcard.tt::before{background:#40c8f0}
.rcard.tn::before{background:#a060f8}
.rcard:hover{border-color:var(--bdrb);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,180,60,0.15)}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.cname{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--tx)}
.ttag{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;padding:2px 8px;border-radius:4px}
.tagm{background:rgba(240,192,64,0.15);color:var(--gold);border:0.5px solid rgba(240,192,64,0.4)}
.tagt{background:rgba(0,180,60,0.12);color:var(--gr)}
.tagT{background:rgba(64,200,240,0.12);color:#40c8f0}
.tagn{background:rgba(160,96,248,0.12);color:#a060f8}
.digs{display:flex;gap:5px;margin-bottom:8px}
.dig{width:36px;height:42px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:24px;border-radius:6px;background:linear-gradient(180deg,var(--bg3) 0%,var(--bg1) 100%);border:1px solid rgba(0,180,60,0.25);color:var(--gr2);text-shadow:0 0 8px var(--glow);transition:all .2s}
.rcard:hover .dig{border-color:var(--bdrb);color:var(--gr2);text-shadow:0 0 12px var(--glow)}
.cmeta{font-size:11px;color:var(--txm);font-family:'DM Mono',monospace}
.chist{margin-top:8px;padding-top:8px;border-top:0.5px solid var(--bdr)}
.chist-title{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;color:var(--txm);margin-bottom:5px}
.chist-nums{display:flex;flex-wrap:wrap;gap:4px}
.chist-num{font-family:'DM Mono',monospace;font-size:11px;padding:2px 6px;border-radius:4px;background:rgba(0,180,60,0.08);border:0.5px solid rgba(0,180,60,0.15);color:var(--txm)}

/* PILLS */
.cpills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.cpill{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;padding:4px 10px;border-radius:6px;border:1px solid var(--bdr);background:transparent;color:var(--txm);cursor:pointer;transition:all .12s}
.cpill:hover{background:rgba(0,180,60,0.08);color:var(--gr)}
.cpill.on{background:rgba(0,180,60,0.15);border-color:var(--bdrb);color:var(--gr2)}

/* METODOS */
.mrow{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.mlbl{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--txm)}
.mbtn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;border:1px solid var(--bdr);background:transparent;color:var(--txm);cursor:pointer;transition:all .12s}
.mc0.on{background:rgba(0,224,75,0.12);border-color:rgba(0,224,75,0.5);color:var(--gr2)}
.mc1.on{background:rgba(240,192,64,0.12);border-color:rgba(240,192,64,0.5);color:var(--gold)}
.mc2.on{background:rgba(64,200,240,0.1);border-color:rgba(64,200,240,0.4);color:#40c8f0}
.mc3.on{background:rgba(160,96,248,0.1);border-color:rgba(160,96,248,0.4);color:#a060f8}
.mc4.on{background:rgba(240,80,80,0.1);border-color:rgba(240,80,80,0.4);color:#f05050}
.mc5.on{background:rgba(64,220,180,0.1);border-color:rgba(64,220,180,0.4);color:#40dcb4}
.mc6.on{background:rgba(240,140,60,0.1);border-color:rgba(240,140,60,0.4);color:#f08c3c}
.mc7.on{background:rgba(100,180,255,0.1);border-color:rgba(100,180,255,0.4);color:#64b4ff}

/* PANEL ANALISIS */
.apanel{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:10px;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ptitle{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:var(--gr3);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ptitle::before{content:'';width:3px;height:14px;background:var(--gr);border-radius:2px;flex-shrink:0}

/* POSICION */
.pgrid4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.pbox{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);padding:10px 6px;text-align:center}
.pblbl{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:1px;color:var(--txm);margin-bottom:3px}
.pbf{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gr2);text-shadow:0 0 10px var(--glow);line-height:1}
.pbc{font-size:9px;color:var(--txm);font-family:'DM Mono',monospace;margin-bottom:3px}
.pbt{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);line-height:1}
.pbtl{font-size:9px;color:var(--txm)}

/* ESTRELLA */
.ebox{background:linear-gradient(135deg,rgba(0,180,60,0.12) 0%,rgba(0,180,60,0.04) 100%);border:1px solid rgba(0,180,60,0.4);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:relative;overflow:hidden}
.ebox::after{content:'ESTRELLA';position:absolute;right:-10px;top:50%;transform:translateY(-50%) rotate(90deg);font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(0,180,60,0.15)}
.elbl{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:2px;color:var(--gr3);margin-bottom:4px}
.enum{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:8px;color:var(--gr2);text-shadow:0 0 20px var(--glow),0 0 40px rgba(0,180,60,0.3);line-height:1}
.epts{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gr);line-height:1}
.esc{font-size:10px;color:var(--txm);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}

/* CANDIDATOS */
.ctitle{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:var(--txm);margin-bottom:10px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px;margin-bottom:14px}
.ccard{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);padding:10px;transition:all .15s}
.ccard.r1{border-color:rgba(0,224,75,0.6);background:rgba(0,180,60,0.08);box-shadow:0 0 15px rgba(0,180,60,0.1)}
.ccard:hover{border-color:var(--bdrb)}
.chdr{display:flex;align-items:center;gap:5px;margin-bottom:7px}
.crk{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--txm);min-width:20px}
.crk.gd{color:var(--gr2);text-shadow:0 0 6px var(--glow)}
.cnum{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--gr2);text-shadow:0 0 8px var(--glow);line-height:1}
.cpts{margin-left:auto;font-family:'DM Mono',monospace;font-size:9px;color:var(--txm);background:rgba(0,0,0,0.3);border:0.5px solid var(--bdr);border-radius:3px;padding:1px 5px}
.cbars{display:flex;flex-direction:column;gap:2px}
.brow{display:flex;align-items:center;gap:4px;font-size:9px}
.blbl{min-width:44px;color:var(--txm);font-family:'Barlow Condensed',sans-serif;font-size:10px}
.btrk{flex:1;height:3px;background:rgba(255,255,255,0.05);border-radius:2px}
.bfil{height:100%;border-radius:2px;transition:width .3s}
.bval{min-width:18px;text-align:right;color:var(--txm);font-family:'DM Mono',monospace}

/* HISTORIAL EN ANALISIS */
.hist-grid{display:flex;flex-direction:column;gap:5px}
.hist-row{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--bg3);border-radius:6px;border:0.5px solid var(--bdr)}
.hist-idx{font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--txm);min-width:20px}
.hist-digs{display:flex;gap:3px}
.hist-dig{width:26px;height:30px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;border-radius:4px;background:var(--bg1);border:0.5px solid rgba(0,180,60,0.2);color:var(--gr2)}
.hist-tag{font-size:9px;background:rgba(0,180,60,0.1);color:var(--gr3);border-radius:3px;padding:1px 5px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}

/* FREQ BARS */
.fbars{display:flex;flex-direction:column;gap:5px}
.frow2{display:flex;align-items:center;gap:8px}
.fdig{min-width:16px;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--tx)}
.ftrk{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:3px}
.ffil{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gr4),var(--gr2))}
.fcnt{min-width:32px;text-align:right;color:var(--txm);font-family:'DM Mono',monospace;font-size:11px}

/* METODOS DESC */
.mdgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:7px}
.mdcard{border-left:2px solid transparent;padding-left:8px}
.mdcard strong{display:block;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:var(--tx);margin-bottom:2px}
.mdcard span{font-size:11px;color:var(--txm);line-height:1.5;font-family:'Barlow Condensed',sans-serif}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;margin-bottom:14px}
.sbox{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px;text-align:center}
.sblbl{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;color:var(--txm);margin-bottom:5px}
.sbval{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gr2);text-shadow:0 0 8px var(--glow)}

/* LEGEND */
.lgrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.lgitem{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--txm);font-family:'Barlow Condensed',sans-serif}
.lgdot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* FOOTER */
.footer{text-align:center;padding:24px 16px;border-top:1px solid var(--bdr);font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:var(--txd)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg0)}::-webkit-scrollbar-thumb{background:var(--gr4);border-radius:2px}
@media(max-width:480px){.tabs{justify-content:flex-start;overflow-x:auto}.tab{font-size:13px;padding:6px 12px}.enum{font-size:28px;letter-spacing:4px}.cnum{font-size:20px;letter-spacing:2px}.pgrid4{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-top">
    <div class="logo-row">
      <div class="logo-circle"><div class="logo-inner">CC</div></div>
      <div><div class="htitle">CHANCES COLOMBIA</div><div class="hsub">Analisis &middot; Candidatos &middot; Estadisticas</div></div>
    </div>
    <div class="hdate" id="fecha"></div>
  </div>
  <div class="slogan">NO ES SUERTE &mdash; <span>ES METODO</span> &mdash; ANALISIS QUE HABLA</div>
</header>
<nav class="tabs">
  <button class="tab on" onclick="showTab('resultados',this)">RESULTADOS</button>
  <button class="tab" onclick="showTab('analisis',this)">ANALISIS</button>
  <button class="tab" onclick="showTab('candidatos',this)">CANDIDATOS</button>
  <button class="tab" onclick="showTab('stats',this)">STATS</button>
</nav>
<main class="main">
  <div id="tab-resultados" class="sec on">
    <div class="frow">
      <span class="flbl">TURNO</span>
      <button class="fbtn on" onclick="filtrar('',this)">TODOS</button>
      <button class="fbtn" onclick="filtrar('manana',this)">MANANA</button>
      <button class="fbtn" onclick="filtrar('dia',this)">DIA</button>
      <button class="fbtn" onclick="filtrar('tarde',this)">TARDE</button>
      <button class="fbtn" onclick="filtrar('noche',this)">NOCHE</button>
    </div>
    <div class="rgrid" id="rgrid"></div>
  </div>
  <div id="tab-analisis" class="sec">
    <div class="cpills" id="pills-a"></div>
    <div id="analisis-out"></div>
  </div>
  <div id="tab-candidatos" class="sec">
    <div class="cpills" id="pills-c"></div>
    <div class="mrow" id="mrow"></div>
    <div id="cands-out"></div>
  </div>
  <div id="tab-stats" class="sec">
    <div id="stats-out"></div>
  </div>
</main>
<footer class="footer">DATOS: LOTERIASDEHOY.CO &middot; SOLO INFORMATIVO &middot; v4.0</footer>

function fD(h){const f={};h.forEach(n=>n.split("").forEach(d=>{f[d]=(f[d]||0)+1}));return f;}
function fPD(h){const f=[];for(let p=0;p<4;p++){const fp={};h.forEach(n=>{const d=n[p];fp[d]=(fp[d]||0)+1;});f.push(fp);}return f;}
function s0(n,h){const f=fD(h),t=h.length*4;let s=0;n.split("").forEach(d=>s+=(f[d]||0)/t);return Math.round(s*25);}
function s1(n,h){let s=0;n.split("").forEach(d=>{const i=h.findIndex(x=>x.includes(d));s+=i<0?20:Math.min(20,i);});return Math.round(s/4*1.5);}
function s2(n,h){const tr={};h.forEach(x=>{for(let i=0;i<3;i++){const k=x[i];tr[k]=tr[k]||{};tr[k][x[i+1]]=(tr[k][x[i+1]]||0)+1;}});let s=0;for(let i=0;i<3;i++){const a=n[i],b=n[i+1],row=tr[a]||{},t=Object.values(row).reduce((x,y)=>x+y,0)||1;s+=(row[b]||0)/t;}return Math.round(s*30);}
function s3(n,h){let s=0;[5,7,10,14,21].forEach(c=>{if(h[c]===n)s+=12;if(h[c*2]===n)s+=8;});return Math.min(35,s);}
function s4(n){const d=n.split(""),u=new Set(d).size,p=d.slice(0,-1).filter((x,i)=>x===d[i+1]).length;return Math.round((u*5)-(p*3)+10);}
function s5(n,h){const r=h.slice(0,10),o=h.slice(10,20);let s=0;n.split("").forEach(d=>{const ri=r.filter(x=>x.includes(d)).length,oi=o.filter(x=>x.includes(d)).length+1;s+=(ri/oi)*5;});return Math.round(s);}
function s6(n,h){const fp=fPD(h),t=h.length;let s=0;for(let p=0;p<4;p++){s+=((fp[p][n[p]]||0)/t)*25;}return Math.round(s);}
function s7(n,h){const r=h.slice(0,5);let s=0;r.forEach((x,i)=>{let m=0;for(let p=0;p<4;p++)if(x[p]===n[p])m++;s+=m*(5-i)*2;});return Math.round(s);}
function scoreN(num,data){const h=data.h,raw=[s0(num,h),s1(num,h),s2(num,h),s3(num,h),s4(num),s5(num,h),s6(num,h),s7(num,h)];let t=0;raw.forEach((v,i)=>{if(ACT[i])t+=v*PESOS[i];});return{raw,total:Math.round(t)};}
function estrellaD(data){const fp=fPD(data.h);return[0,1,2,3].map(p=>Object.entries(fp[p]).sort((a,b)=>b[1]-a[1])[0][0]).join("");}
function top10(id){

  if(id==="candidatos"){renderPills("pills-c","c",selC);renderMRow();renderCands();}
  if(id==="stats")renderStats();
}
(function init(){
  const d=new Date();
  const dias=["DOM","LUN","MAR","MIE","JUE","VIE","SAB"];
  const meses=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEP","OCT","NOV","DIC"];
  document.getElementById("fecha").textContent=dias[d.getDay()]+" "+d.getDate()+" DE "+meses[d.getMonth()]+" DE "+d.getFullYear();
  renderResultados();
})();
</script>
